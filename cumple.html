<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumpleaños – Ka</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to top, #FBB6AE, #FDBE50);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 40px;
}

.volver {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  text-decoration: none;
}

/* GALERÍA */
.galeria {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 40px;
}

.tarjeta {
  width: 300px;
  border-radius: 15px;
  overflow: hidden;
  background: white;
  cursor: pointer;
  transition: 0.3s;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.tarjeta:hover {
  transform: scale(1.05);
}

/* VIDEO RESPONSIVE */
.video-container {
  width: 100%;
}

.video-container video {
  width: 100%;
  border-radius: 15px;
}

/* BOTONES */
.btn-wsp {
  margin: 10px 0 5px 0;
  padding: 10px;
  border: none;
  border-radius: 15px;
  background: #25D366;
  color: white;
  font-weight: bold;
  cursor: pointer;
  width: 80%;
}

button {
  margin-bottom: 10px;
  padding: 10px;
  border: none;
  border-radius: 15px;
  background: #FDBE50;
  font-weight: bold;
  cursor: pointer;
  color: #333;
  width: 80%;
}

/* BOTÓN DE SONIDO */
#activar-sonido {
  background: #FDBE50;
  color: #333;
  font-weight: bold;
  border-radius: 15px;
  padding: 8px;
  cursor: pointer;
  margin: 5px 0;
}
</style>
</head>

<body>

<a class="volver" href="invitaciones.html">← Volver</a>

<h1>🎂 Invitaciones de Cumpleaños</h1>
<p>Elige tu estilo favorito 💛</p>

<div class="galeria">

  <!-- TARJETA CON VIDEO MP4 LOCAL -->
  <div class="tarjeta">
    <div class="video-container">
      <video id="video" autoplay muted loop playsinline>
        <source src="cumple-video.mp4" type="video/mp4">
        Tu navegador no soporta el video.
      </video>
    </div>

    <!-- BOTÓN PARA ACTIVAR SONIDO -->
    <button id="activar-sonido">🔊 Activar sonido</button>

    <a href="https://wa.me/56932938800?text=Hola%20quiero%20este%20diseño%20de%20invitación" target="_blank">
      <button class="btn-wsp">💚 Pedir este diseño</button>
    </a>

    <button onclick="irInvitacion(event)">💌 Ver</button>
  </div>

  <!-- TARJETA CON IMAGEN 2 -->
  <div class="tarjeta" onclick="window.location.href='inv2.html'">
    <img src="cumple2.jpg" style="width:100%; border-radius:15px;" alt="Invitación 2">
  </div>

  <!-- TARJETA CON IMAGEN 3 -->
  <div class="tarjeta" onclick="window.location.href='inv3.html'">
    <img src="cumple3.jpg" style="width:100%; border-radius:15px;" alt="Invitación 3">
  </div>

</div>

<script>
function irInvitacion(e) {
  e.stopPropagation();
  window.location.href = "inv1.html";
}

// Activar sonido del video
const video = document.getElementById("video");
const boton = document.getElementById("activar-sonido");

boton.addEventListener("click", () => {
  video.muted = false; // Quita mute
  video.play();         // Reproduce con sonido
  boton.style.display = "none"; // Oculta el botón después
});
</script>

</body>
</html>
